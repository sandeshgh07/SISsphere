<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #f9f9f9; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border: 1px solid #ccc; }
        .header { text-align: center; border-bottom: 2px solid #003333; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: #003333; margin: 0; }
        .details { margin-bottom: 20px; }
        .total { font-size: 1.2em; font-weight: bold; text-align: right; margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
        .footer { margin-top: 40px; font-size: 10px; text-align: center; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PAYMENT RECEIPT</h1>
            <p>{{ school_name }}</p>
        </div>
        <div class="details">
            <p><strong>Receipt #:</strong> {{ receipt_number }}</p>
            <p><strong>Date:</strong> {{ date }}</p>
            <p><strong>Student:</strong> {{ student_name }}</p>
            <p><strong>Description:</strong> {{ description }}</p>
        </div>
        <div class="total">
            Amount Paid: {{ amount }}
        </div>
        <div class="footer">
            Thank you for your payment.<br>
            {{ school_address }}
        </div>
    </div>
</body>
</html>
